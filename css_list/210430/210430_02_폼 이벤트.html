<!DOCTYPE html>

<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>폼 이벤트 form event</title>
  <style>
    body {
      color: red;
      font-size: 22px;
    }
    form > #txt_1 {/*폼 관련 요소에 직접 특성을 적용해야 됨*/
      background-color: #f8f5f1;
      color: teal;
      font-size: 22px;
    }
    form > #txt_1:focus {/*포커스 상태일때*/
      background-color: #d23c45;
      color: yellow;
      font-size: 22px;
    }
    form > #btn_1 {
      background-color: #81b214;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
    }
    form > #btn_1:hover {
      background-color: #384672;
    }
  </style>
</head>

<body>
  <h1>폼 이벤트 form event</h1>
  <form action="http://-">
    <input type="text" name="txt1" id="txt_1">
    <button type="submit" id="btn_1">제출</button>
  </form>
</body>

</html>
