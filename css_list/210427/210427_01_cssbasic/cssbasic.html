<!DOCTYPE html>

<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>css 기본</title>
        <!--외부 선언-->
        <link rel="stylesheet" href="style.css">
        <!--내부 선언-->
        <style>
            /* css 주석 처리 방식 */
            /*
            선택자selector {
                특성property : 값 value
            }
            */
        </style>
    </head>
    <body>
        <h1>css 기본</h1>
        <h2>css 선언 방법</h2>

            <li>내부 선언: &lt;head&gt; 안에 &lt;style&gt;태그 안에 작성.</li>
            <li>직접(인라인) 선언 : &lt;a href="#" style="color:#fd9&gt; *거의 사용하지 않음</li>
        </ul>

</html>
