<!DOCTYPE html>

<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>css 우선순위</title>
        <link rel="stylesheet" href="style.css">
        <style>
            h2{
                color:maroon;
                background-color: lightblue;
            }
            h2{/*가장 아래쪽에 작성된 같은 이름의 선택자 적용*/
                background-color: rosybrown;
                background-color: lightcoral;/*적용*/
            }
            .box {/*클래스 선택자: 사용자가 이름을 지정할 수 있으며 불특정 다수의 꾸밈 값을 줄 때 사용. 한 문서 안에 같은 이름을 여러 번 사용 가능*/
                background-color: lightgreen;
            }
            #box1 {
                background-color: white;
            }
            #box2
            {
                background-color: lime;
            }
            .bg {
                background-color: #ddd !important; /*기본 우선 순위가 무시되면 무조건 적용. 꼭 필요한 경우 주의해서 사용*/
            }
            section {
                background-color: black;
            }
            /*.color2 
            {
                color: hotpink;
            }*/
        </style>
    </head>
    <body>
        <h1>css 우선순위</h1>
        <section id="box1" class="box" style="background-color: lightslategray;">
            <h2>같은 이름의 선택자인 경우</h2>
            <p>위에서 아래로 순차적으로 적용되고 마지막에 선언된 스타일이 우선 순위를 갖는다.</p>
        </section>
        <!-- class="box bg" .box와 .bg를 의미. 즉 2개의 클래스 선택자 적용. 띄어쓰기로 구분-->
        <section id="box2" class="box bg">
            <h2>같은 선택자가 아닌 다른 선택자인 경우</h2>
            <p>!important > (직접,inline > ) id(5) > .class(3) > type(1)
                순으로 우선 순위를 갖는다.
            </p>
        </section>
        <section class="box color1 color2">
            <h2>다른 종류의 선언문이며 같은 선택자의 경우</h2>
            <p>(직접, inline >) 내부선언 > 외부선언 순으로 우선 순위를 갖는다.</p>
        </section>
    </body>
</html>
