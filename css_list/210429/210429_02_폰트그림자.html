<!DOCTYPE html>

<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>font와 text의 여러 특성들</title>
  <style>
    h2 {
      font-family: '휴먼아미체', '맑은 고딕', sans-serif;
      font-size: 80px;
      text-align: center;
      text-transform: capitalize;
    }
    #title1 {
      text-shadow: 6px 6px 5px #999;/* x축 y축 번짐 색상 */
    }
    #title2 {
      text-shadow: -6px -6px 15px #999;/* x축 y축 번짐 색상 */
    }
    #title3 {
      text-shadow: 0 6px 5px hotpink;/* x축 y축 번짐 색상 */
    }
    #title4 {
      text-shadow: 6px 3px 0px orange;/* 번짐 생략 가능*/
    }
    #title5 {
      text-shadow: 0 6px;/* 번짐과 색상 생략 */
    }
    
  </style>
</head>

<body>
  <h2 id="title1">서체 그림자 text-shadow 1</h2>
  <h2 id="title2">서체 그림자 text-shadow 2</h2>
  <h2 id="title3">서체 그림자 text-shadow 3</h2>
  <h2 id="title4">서체 그림자 text-shadow 4</h2>
  <h2 id="title5">서체 그림자 text-shadow 5</h2>
</body>

</html>
