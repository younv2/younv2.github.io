<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>가로 세로 영역 조절 width, height</title>
    <style>
        /*
            블록 요소 : p, div, h1, header, ul, li, article...
                블록 요소 옆에 다른 요소가 올 수 없음.
                가로 값의 경우 부모 요소의 가로 값을 물려 받음.
                세로 값의 경우 자식의 높이 값을 받음.
                width, height 값으로 제어 가능.
            인라인 요소 : span, strong, a, img, input...
                인라인 요소 옆에 다른 인라인 요소가 올 수 있음.
                가로, 세로 값의 경우 자식(컨텐츠)이 가지는 값을 받음.
                width, height 값으로 제어 불가
                (img와 input등 몇몇 특별한 요소는 예외)
        */
        body {
            font-weight: bold;
            font-size: 20px;
        }
        div.box1{/* 종속 선택자 : 띄어쓰기없이 작성. 단독으로 쓰이는 선택자들보다 우선 순위가 필요할 때 주로 사용*/
            background-color: salmon;
            /*고정 너비*/
            width: 500px;
            height: 300px;
        }
        div.box1 > div.block1{/* 자식 선택자 */
            background-color: maroon;
            color: #fff;
            /*가변 너비*/
            width: 60%;/* 부모를 기준으로 60%*/
            height: 50%;/*세로의 %는 부모의 높이값이 한정되어 있는 경우에만 적용*/
        }
        div.box1 > span.inline1 {
            background-color: lightblue;
            width: 400px;
            height:200px;
        }
        p.box2 {
            background-color: #2a9d8f;
            width:500px;height: 100px;
        }
        span.inline2 {
            background-color: #d62828;
            width: 500px;height: 100px;
        }
    </style>
</head>

<body>
    <h1>가로 세로 영역 조절 width, height</h1>
    <div class="box1">
        <div class="block1">블록 요소</div>
        <span class="inline1">인라인 요소</span>
    </div>
    <p class="box2"></p>
    <span class="inline2"></span>
</body>

</html>
