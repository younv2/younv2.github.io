<!DOCTYPE html>

<html lang = "ko">
<head>
	<meta charset = "UTF-8">
	<title>Anchor 태그 a</title>
</head>
<body>
	<h1>앵커 Anchor 태그 a</h1>
	<p><strong>href 속성을 이용하여 <mark>하이퍼 텍스트</mark> 설정<br>**인라인 요소</strong></p>
	<a href ="http://www.w3.org">클릭</a>하면 해당 페이지로 이동합니다.
	<ul>
		<li>링크를 의미하는 밑줄로 표기</li>
		<li>기본 색상은 파란색</li>
		<li>방문한 적이 있는 곳은 보라색</li>
		<li>마우스로 누르고 있으면 빨간색</li>
		<li>a의 속성 값을 ""의 형태로 비워두지 않음<br>
		href="#"처럼 임시링크 기호로 대체 표기</li>
	</ul>
	<h2>절대 경로</h2>
	<p>반드시 <strong>http://</strong>으로 시작하는 주소로 외부 사이트 이동시 사용</p>
	<ul>
		<!-- target = "_blank" 새창으로 열기, 외부 주소일 경우 새창으로 열어주는 것이 좋음 -->
		<li><a href="http://google.com" target="_blank">구글 바로가기</a></li>
		<li><a href="http://naver.com" target="_blank">네이버 바로가기</a></li>
		<li><a href="http://daum.net" target="_blank">다음 바로가기</a></li>
	</ul>
</body>
</html>
