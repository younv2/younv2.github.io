<!DOCTYPE html>

<html lang ="ko">
    <head>
        <meta charset="UTF-8">
        <title>테이블 태그 table</title>
    </head>
    <body>
        <h1>테이블 셀 제목 th</h1>
        <p>각 셀들에 대한 대표성을 띄는 요소로 td와 동일하게 셀(칸)을 만들어 준다.</p>
        <table border=1>
            <tr><!--행(줄)-->
                <th></th><!-- 셀(칸) -->
                <td>토요일</td>
                <td>일요일</td>
            </tr>
            <tr><!--행(줄)-->
                <th>티켓 판매</th><!-- 셀(칸) -->
                <td>120</td>
                <td>200</td>
            </tr>
            <tr><!--행(줄)-->
                <th>총 매출</th><!-- 셀(칸) -->
                <td>\500,000</td>
                <td>\1,800,000</td>
            </tr>
        </table>
    </body>
</html>
