<!DOCTYPE html>

<html lang ="ko">
    <head>
        <meta charset="UTF-8">
        <title>테이블 태그 table</title>
    </head>
    <body>
        <h1>행 병합 속성 rowspan</h1>
        <table border=1>
            <tr><!--행(줄)-->
                <th></th><!-- 셀(칸) -->
                <th>넷플릭스</th>
                <th>ocn</th>
                <th>올리브</th>
            </tr>
            <tr><!--행(줄)-->
                <th>6pm - 7pm</th><!-- 셀(칸) -->
                <!-- colspan 속성은 뒤에 오는 셀(th, td)과 합침,-->
                <td rowspan="2">영화</td>
                <td>코미디</td>
                <td rowspan="3">뉴스</td>
            </tr>
            <tr><!--행(줄)-->
                <th>7pm - 8pm</th><!-- 셀(칸) -->
                <td rowspan="2">스포츠</td>
            </tr>
            <tr><!--행(줄)-->
                <th>8pm - 9pm</th><!-- 셀(칸) -->
                <td>다큐멘터리</td>
            </tr>
        </table>
    </body>
</html>
