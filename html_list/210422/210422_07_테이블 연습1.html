<!DOCTYPE html>

<html lang ="ko">
    <head>
        <meta charset="UTF-8">
        <title>테이블 연습 1</title>
    </head>
    <body>
        <h1>테이블 연습 1</h1>
        <table border=1>
            <caption>2021 식비</caption>
            <tr><!--행(줄)-->
                
                <th>월</th><!-- 셀(칸) -->
                <th>일</th>
                <th>금액</th>
            </tr>
            <tr><!--행(줄)-->
                <th rowspan="2">1월</th><!-- 셀(칸) -->
                <!-- colspan 속성은 뒤에 오는 셀(th, td)과 합침,-->
                <td>1일</td>
                <td>1,000</td>
            </tr>
            <tr><!--행(줄)-->
                <td>2일</td>
                <td>2,000</td>
            </tr>
            <tr><!--행(줄)-->
                <th colspan="2">합계</th><!-- 셀(칸) -->
                <td>3,000</td>
            </tr>
        </table>
    </body>
</html>
