<!DOCTYPE html>

<html lang ="ko">
    <head>
        <meta charset="UTF-8">
        <title>테이블 태그 table</title>
    </head>
    <body>
        <h1>열 병합 속성 colspan</h1>
        <table border=1>
            <tr><!--행(줄)-->
                <th></th><!-- 셀(칸) -->
                <th>9am</th>
                <th>10am</th>
                <th>11am</th>
                <th>12am</th>
            </tr>
            <tr><!--행(줄)-->
                <th>월요일</th><!-- 셀(칸) -->
                <!-- colspan 속성은 뒤에 오는 셀(th, td)과 합침,-->
                <td colspan="2">UI 디자인</td>
                <td>html</td>
                <td>css</td>
            </tr>
            <tr><!--행(줄)-->
                <th>화요일</th><!-- 셀(칸) -->
                <td colspan="3">체육</td>
                <td>디자인</td>
            </tr>
        </table>
    </body>
</html>
