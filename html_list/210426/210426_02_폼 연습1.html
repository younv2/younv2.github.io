<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>폼 연습</title>
</head>

<body>
    <h1>폼 연습 1</h1>  
    <form action="http://-">
        <section>
            <h2>상세정보</h2>
            <label>이름 : <input type="text" name="user_name" autofocus></label><br>
            <label>이메일 : <input type="text" name="user_email"></label>
        </section>
        <section>
            <h2>리뷰</h2>
            <ol>
                <li><label for="site">사이트를 알게 된 경위는?
                    <select id ="site">
                        <option value="온라인" selected>온라인</option>
                        <option value="오프라인">오프라인</option>
                    </select></label></li>
                    <li>
                        다시 방문하시겠습니까?
                        <label><input type="radio" name="visit"> 예</label>
                        <label><input type="radio" name="visit"> 아니요</label>
                        <label><input type="radio" name="visit"> 모름</label><br>
                    </li>
                    <li>
                        <label for="txt_box">의견</label><br>
                        <textarea cols="30" rows="3" name="opinion_txt_box" id = "txt_box" placeholder="이곳에 작성하세요"></textarea><br>
                    </li>
                    <li>
                        <label><input type="checkbox" name="email_check_box">이메일에 가입하시겠습니까?</label><br>
                    </li>
            </ol>
            <button type="submit">리뷰 전송</button>
            <button type="reset">취소</button>
            
        
        </section>
    </form>
</body>

</html>
