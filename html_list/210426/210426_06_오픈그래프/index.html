<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>open graph 연습</title>
    <!-- 태그를 통해 제공하는 문서 정보들-->
    <meta name="title" content="오픈그래피 연습">
    <meta name="description" content="실제 호스팅 업체에 업로드하여 확인할 문서입니다..">
    <!-- ** open Graph-->
    <meta property="og:title" content="이곳에 작성된 내용이 메신저나 sns의 제목 부분에 출력">
    <meta property="og:description" content="이곳에 작성된 내용이 메신저나 sns의 설명 부분에 출력">
    <meta property="og:image" content="http://younv2.dothome.co.kr/images/sprite.png">
    <meta property="og:url" content="http://younv2.dothome.co.kr/">
</head>

<body>
    <h1>open graph 연습</h1>
    <ul>
        <li>og:title 제목</li>
        <li>og:description 설명</li>
        <li>og:image 이미지경로</li>
        <li>og:url 웹주소</li>
    </ul>>
</body>

</html>
