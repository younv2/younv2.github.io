<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>비디오 video</title>
</head>

<body>
    <h1>비디오 video</h1>  
    <ul>
        <li>웹 브라우저에서 플러그인 도움없이 재생</li>
        <li>다양한 브라우저에서 플레이 될 수 있도록 하기 위해 &lt;source&gt;태그 사용</li>
    </ul>
    <!--video의 여러 속성
    preload 재생 전 파일 미리 불러옴
    autoplay 자동재생(크롬의 경우 음소거 설정이 되어 있어야 가능)
    muted 음소거
    loop 반복
    controls 컨트롤 바
    poster 대체 이미지
    -->
    <video src="videos/mov_bbb.mp4" preload autoplay muted loop controls>
        <!--<source src="경로" type= "영상의 포맷값">-->
        <!--<soruce src="videos/mov_bbb.mp4" type="video/mp4">-->
    </video>
</body>

</html>
