<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>폼 연습</title>
</head>
<!--
    section = 반드시 제목이 있어야함, 컨텐츠가 나눠질때
    div = 
    article = 독립적인 컨텐츠 일때
-->
<body>
    <h1>폼 연습 2</h1>
    <form action="http://-">
    <table border="1">
        <caption>실습예제</caption>
        <tr>
            <th>학교</th>
            <td colspan="2"><input type="text"></td>
            <td><button type="button">학교 찾기</button></td>
        </tr>
        <tr>
            <th>담당학년</th>
            <td colspan="3">
                <select>
                    <option value="grade_1">1</option>
                    <option value="grade_2">2</option>
                    <option value="grade_3">3</option>
                </select>학년 
                <select>
                    <option value="room_1">1</option>
                    <option value="room_2">2</option>
                    <option value="room_3">3</option>
                </select>반</td>
        </tr>
        <tr>
            <th>학교전화</th>
            <td>
                <select>
                    <option value="select">선택</option>
                    <option value="ktf">KTF</option>
                    <option value="skt">SKT</option>
                    <option value="lgu">LGU+</option>
                </select>
            </td>
            <td>-</td>
            <td><input type="text">-<input type="text"></td>
        </tr>
        <tr>
            <th>휴대전화</th>
            <td>
                <select>
                    <option value="select">선택</option>
                    <option value="ktf">KTF</option>
                    <option value="skt">SKT</option>
                    <option value="lgu">LGU+</option>
                </select>
            </td>
            <td>-</td>
            <td><input type="text" required>-<input type="text" required>*휴대전화번호는 선생님 인증을 위해 반드시 입력해 주세요</td>
        </tr>
        <tr>
            <th rowspan="3">교사인증</th>
            <td colspan="3"><input type="file"></td>
        </tr>
        <tr>
            <td colspan="3">*교사 인증은 교육 행정 정보시스템 로그인 한 다음 화면 캡쳐해서 첨부해주시면 됩니다.</td>
        </tr>
        <tr>
            <td colspan="3"><a href="#">[자세한 방법 보기]</a></td>
        </tr>
        <tr>
            <th rowspan="2">간단한 인사 및 소개</th>
            <td colspan="3"><textarea></textarea></td>
        </tr>
        <tr>
            <td colspan="3">*간단한 인사 및 소개를 남겨 주시면 교내 사랑방 게시판에 자동 등록되어 집니다.</td>
        </tr>
    </table>
    <button type="submit">등록</button>
    <button type="reset">취소</button>
</form>
</body>

</html>
