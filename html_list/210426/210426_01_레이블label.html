<!DOCTYPE html>

<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>레이블 label</title>
</head>

<body>
    <h1>레이블 label</h1>
    
    <ul>
        <li>인라인</li>
        <li>폼과 관련된 요소에 이름표 지정</li>
        <li>label 요소를 정의함으로써 폼 요소와 연관시킬 수 있음</li>
        <li>키보드를 통해 컨트롤이 가능하여 접근성 향상</li>
        <li><strong>&lt;input id="one"&gt;의 아이디 값과 &lt;label for="one"&gt;의 for 값이 동일해야 연결 됨</strong></li>
    </ul>

    <form action="http://">
        <section>
            <h2>연결 방법 1</h2>
            <!--autofocus 자동으로 포커스를 줌-->
            <label>이름 : <input type="text" name="user_name" autofocus required></label><br>
            <!--  disabled 비활성화-->
            <label>아이디 : <input type="text" name="user_id" disabled></label>
        </section>
        <section>
            <h2>연결 방법 2</h2>
            <table border="1">
                <caption>성별</caption>
                <tr>
                    <td><input type="radio" name ="choice" value="woman" id="female"></td>
                    <td>
                        <label for="female">여성</label>
                    </td>
                </tr>
                <tr>
                    <td><input type="radio" name ="choice" value="man" id="male"></td>
                    <td><label for="male">남성</label></td>
                </tr>
            </table>
        </section>
        
    </form>
    
</body>

</html>
